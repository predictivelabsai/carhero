# Canonical variant catalog for apples-to-apples price comparisons.
#
# Each entry defines a "clean" trackable variant -- a car identity where
# the name alone is enough for meaningful price comparison across markets.
# These are models where options/transmission don't dominate pricing.
#
# Fields:
#   make:             Must match car_listings.make exactly
#   model_pattern:    Regex matching the model field across providers
#   canonical_label:  Display name used for grouping (unique key)
#   generation:       Generation code (e.g., "991", "E46")
#   year_range:       [start, end] production years
#   match_keywords:   Required keywords in model+variant text (ALL must match)
#   exclude_keywords: If ANY found, reject the match
#   clean_level:      "high" = single spec, "medium" = some option spread

variants:

  # ── Porsche ──────────────────────────────────────────────────────────

  - make: Porsche
    model_pattern: "^(911|996)$"
    canonical_label: "Porsche 911 GT3 (996)"
    generation: "996"
    year_range: [1999, 2005]
    match_keywords: ["GT3"]
    exclude_keywords: ["GT3 RS"]
    clean_level: high

